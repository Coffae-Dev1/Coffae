<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFFAÉ — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <nav class="contact-nav">
        <a href="index.html" class="contact-logo schoolbell-regular">COFFAÉ</a>
        <div class="contact-nav-links">
            <a href="product.html">Products</a>
            <a href="about.html">Our Story</a>
            <a href="opportunity.html">Opportunity</a>
            <a href="cart.html" class="contact-nav-cart">0</a>
        </div>
    </nav>

    <section class="contact-hero">
        <img src="img/contacthero.jpg" alt="Coffae contact hero" class="contact-hero-img">
        <div class="contact-hero-overlay"></div>
    </section>

    <main class="contact-main" id="contactMain">
        <div class="contact-body">

            <p class="contact-eyebrow">Get in touch</p>
            <h2 class="contact-title">Send us<br>a message.</h2>

            <form class="contact-form" id="contactForm" onsubmit="handleSubmit(event)">

                <div class="contact-form-row">
                    <div class="contact-field">
                        <label class="contact-label">First name</label>
                        <input type="text" class="contact-input" placeholder="—" required>
                    </div>
                    <div class="contact-field">
                        <label class="contact-label">Last name</label>
                        <input type="text" class="contact-input" placeholder="—" required>
                    </div>
                </div>

                <div class="contact-field">
                    <label class="contact-label">Email</label>
                    <input type="email" class="contact-input" placeholder="—" required>
                </div>

                <div class="contact-field">
                    <label class="contact-label">Subject</label>
                    <select class="contact-select">
                        <option>General inquiry</option>
                        <option>Product question</option>
                        <option>Licensing interest</option>
                        <option>Press & media</option>
                    </select>
                </div>

                <div class="contact-field">
                    <label class="contact-label">Message</label>
                    <textarea class="contact-textarea" placeholder="—" required></textarea>
                </div>

                <button type="submit" class="contact-btn">Send</button>

            </form>

            <div class="contact-thankyou" id="contactThankyou">
                <h2 class="contact-thankyou-title schoolbell-regular">Thank you.</h2>
                <p class="contact-thankyou-sub">We'll get back to you shortly.</p>
            </div>

            <div class="contact-footer-info">
                <div>
                    <p class="contact-info-label">Email</p>
                    <p class="contact-info-val">hello@coffae.co</p>
                </div>
                <div>
                    <p class="contact-info-label">Follow</p>
                    <div class="contact-socials">
                        <a href="https://www.instagram.com/anzacoffee/">Instagram</a>
                        <a href="https://www.pinterest.com/pin/18999629668736580/">Pinterest</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/contact.js"></script>
</body>
</html>
